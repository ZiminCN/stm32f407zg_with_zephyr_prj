CONFIG_CPP=y
CONFIG_CPP_MAIN=y
CONFIG_MINIMAL_LIBC_MALLOC_ARENA_SIZE=1024
CONFIG_HEAP_MEM_POOL_SIZE=1024
# Serial Drivers
CONFIG_SERIAL=y

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# enable console
CONFIG_CONSOLE=y

# enable uart driver
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_UART_ASYNC_API=n
# GPIO Controller
CONFIG_GPIO=y

CONFIG_PWM=y

CONFIG_CAN=y

CONFIG_SPI=y

CONFIG_HWINFO=y

CONFIG_TRACING=y

# Enables clocks
CONFIG_CLOCK_CONTROL=y

# enable pin controller
CONFIG_PINCTRL=y

CONFIG_RING_BUFFER=y
